version: 2

sources:
  - name: conformed
    database: raw
    schema: conformed

    tables:
      - name: DateDimension
        columns:
          - name: DateKey
            tests:
              - unique

  - name: fudgemart_v3
    database: "RAW"
    schema: "FUDGEMART_V3"

    tables:
      - name: "FM_CUSTOMERS"
        columns:
          - name: "CUSTOMER_ID"
            tests:
              - unique

      - name: "FM_CUSTOMER_CREDITCARDS"
        columns:
          - name: "CUSTOMER_ID"
            tests:
              - not_null
          - name: "CREDITCARD_ID"
            tests:
              - not_null

      - name: "FM_PRODUCTS"
        columns:
          - name: "PRODUCT_ID"
            tests:
              - unique

    